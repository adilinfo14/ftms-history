<!-- Copie de base du mini-site FTMS, à personnaliser pour chaque chantier -->
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FTMS CONCEPT - Chantier Exemple</title>
    <link href="https://fonts.googleapis.com/css?family=Montserrat:400,700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Montserrat', Arial, sans-serif; background: #f7f7f7; color: #222; min-height: 100vh; }
        .container { max-width: 900px; margin: 0 auto; padding: 0 1rem; }
        .slide { display: none; flex-direction: column; align-items: center; background: #fff; border-radius: 18px; box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08); padding: 2.5rem; text-align: center; margin-top: 2rem; min-height: 520px; max-width: 700px; min-width: 320px; width: 100%; margin-left: auto; margin-right: auto; justify-content: flex-start; position: relative; }
        .slide.active { display: flex; }
        .slide-logo-mini { position: absolute; top: 18px; right: 18px; width: 54px; height: 54px; object-fit: contain; opacity: 0.85; z-index: 2; }
        .media { max-width: 100%; max-height: 340px; border-radius: 12px; margin-bottom: 1.2rem; box-shadow: 0 2px 12px rgba(0, 0, 0, 0.07); background: #f2f2f2; object-fit: contain; }
        .footer { margin-top: 2rem; font-size: 0.95rem; color: #888; text-align: center; }
        .nav-btn { background: #2a4d7a; color: #fff; border: none; border-radius: 50%; width: 48px; height: 48px; font-size: 1.7rem; cursor: pointer; margin: 0 1rem; transition: background 0.2s; }
        .nav-btn:active { background: #18304d; }
        @media (max-width: 700px) { .container { max-width: 99vw; } .slide { padding: 0.7rem 0.1rem; max-width: 99vw; } .media { max-height: 160px; } .slide-logo-mini { width: 36px; height: 36px; top: 8px; right: 8px; } }
    </style>
</head>
<body>
    <div class="container">
        <div id="slides-container"></div>
        <div style="margin-top:1.5rem; text-align:center;">
            <button class="nav-btn" id="prevBtn">&#8592;</button>
            <button class="nav-btn" id="nextBtn">&#8594;</button>
        </div>
        <div class="footer" style="margin-top:2.2rem;">
            © 2026 FTMS CONCEPT – Tous droits réservés<br>
            <span style="display:block;font-size:0.92em;color:#2a4d7a;line-height:1.5;margin-top:0.5em;">
                <a href="http://www.ftms-concept.com/index.php" target="_blank" style="color:#2a4d7a;text-decoration:underline;">www.ftms-concept.com</a><br>
                Tél : +(33) 4 26 17 58 65<br>
                Siège social : 4 rue des ASTERS 01600 REYRIEUX
            </span>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <script>
        // Slides à personnaliser pour chaque chantier
        const slides = [
            {
                type: 'intro',
                logo: '../media/photo/logo ftms concept.png',
                slogan: "Avant/Après : l’art de la transformation",
                text: "Bienvenue sur le mini-site de ce chantier FTMS CONCEPT. Présentation à personnaliser."
            },
            // Ajoute ici les slides spécifiques à ce chantier (photos, vidéos, textes)
            {
                type: 'qr',
                title: 'Merci de votre confiance !',
                text: `<div style=\"font-size:1.13rem;font-weight:500;color:#2a4d7a;margin-bottom:0.7rem;\">Merci de votre confiance !</div>
                       <div style=\"font-size:1.01rem;color:#333;margin-bottom:1.2rem;\">Scannez ce QR code pour retrouver cette présentation sur votre mobile :</div>
                       <div class=\"qr\"><canvas id=\"qr-canvas-final\"></canvas></div>
                       <div style=\"font-size:0.98rem;color:#888;margin-top:1.2rem;\">https://www.ftms-concept.noschoixpourvous.com/</div>`
            }
        ];
        const slidesContainer = document.getElementById('slides-container');
        let currentSlide = 0;
        function renderSlides() {
            slidesContainer.innerHTML = '';
            slides.forEach((slide, idx) => {
                const div = document.createElement('div');
                div.className = 'slide' + (idx === currentSlide ? ' active' : '');
                if (slide.type === 'intro') {
                    div.innerHTML = `
                <div style=\"display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100%;\">
                  <img src=\"${slide.logo}\" alt=\"Logo\" style=\"width:180px;max-width:60vw;max-height:180px;margin-bottom:1.2rem;object-fit:contain;\">
                  <div style=\"font-size:2.1rem;font-weight:bold;color:#2a4d7a;margin-bottom:0.7rem;letter-spacing:1px;\">FTMS CONCEPT</div>
                  <div class=\"slogan\" style=\"font-size:1.25rem;margin-bottom:0.7rem;font-weight:bold;color:#333;\">${slide.slogan}</div>
                  <div class=\"slide-text\" style=\"font-size:1.13rem;margin-bottom:2.7rem;max-width:520px;\">${slide.text}</div>
                </div>
            `;
                } else if (slide.type === 'qr') {
                    div.innerHTML = `<img src="../media/photo/logo ftms concept.png" class="slide-logo-mini" alt="logo mini">`;
                    div.innerHTML += `<div class="slide-title" style="font-size:1.18rem;color:#2a4d7a;font-weight:500;margin-bottom:1.1rem;text-align:center;">${slide.title}</div>`;
                    div.innerHTML += `<div class="slide-text" style="padding:0 0.5rem;">${slide.text}</div>`;
                }
                slidesContainer.appendChild(div);
            });
            // Génération du QR code sur la slide finale si présente
            if (slides[currentSlide].type === 'qr') {
                setTimeout(() => {
                    const qrCanvas = document.getElementById('qr-canvas-final');
                    if (qrCanvas && window.QRious) {
                        new QRious({
                            element: qrCanvas,
                            value: 'https://www.ftms-concept.noschoixpourvous.com/',
                            size: 180
                        });
                    }
                }, 120);
            }
        }
        function showSlide(idx) {
            if (idx < 0 || idx >= slides.length) return;
            currentSlide = idx;
            renderSlides();
        }
        document.getElementById('prevBtn').onclick = () => showSlide(currentSlide - 1);
        document.getElementById('nextBtn').onclick = () => showSlide(currentSlide + 1);
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') showSlide(currentSlide - 1);
            if (e.key === 'ArrowRight') showSlide(currentSlide + 1);
        });
        renderSlides();
    </script>
</body>
</html>
